name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Run Ruff
        run: uvx ruff check .

      - name: Build package
        run: uv build
